<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    
</head>
<body>
<div id="loader" class="loader-container" style="display:none;">
    <div class="spinner"></div>
</div>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <h2>🎓 SMS</h2>
        </div>

        <ul class="menu">
            <li class="active">Dashboard</li>
            <li>Students</li>
            <li>Users</li>
            <li onclick="logout()">Logout</li>
            <a href="{{ url_for('audit') }}" class="btn btn-primary">Audit</a>
        </ul>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Header -->
        <header class="topbar">

            <h1>Student Management Dashboard</h1>

            <div class="top-buttons">

                <button onclick="loadStudents()">
                    🔄 Refresh
                </button>

                <button onclick="showAddStudent()">
                    ➕ Add Student
                </button>

            </div>

        </header>

        <!-- Dashboard Cards -->
        <section class="stats">

            <div class="card">
                <h3 id="totalStudents">0</h3>
                <p>Total Students</p>
            </div>

            <div class="card">
                <h3 id="totalUsers">0</h3>
                <p>Total Users</p>
            </div>

            <div class="card">
                <h3 id="totalAdmins">0</h3>
                <p>Admins</p>
            </div>

        </section>

        <!-- Search -->
        <section class="search-section">

            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Search student..."
                onkeyup="searchStudents()"
            >

        </section>

        <!-- Loading -->
        <div id="loading" style="display:none;">
            Loading students...
        </div>

        <!-- Add / Update Form -->
        <section id="addStudentForm" class="student-form" style="display:none;">

            <h3 id="formTitle">Add Student</h3>

            <input
                type="text"
                id="studentName"
                placeholder="Student Name"
            >

            <input
                type="number"
                id="studentAge"
                placeholder="Age"
            >

            <input
                type="text"
                id="studentGrade"
                placeholder="Grade"
            >

            <div class="form-buttons">

                <button
                    id="submitBtn"
                    onclick="submitStudent()">
                    Add Student
                </button>

                <button
                    id="updateBtn"
                    style="display:none;"
                    onclick="updateStudent(currentStudentId)">
                    Update Student
                </button>

                <button onclick="hideAddStudent()">
                    Cancel
                </button>

            </div>

        </section>

        <!-- Student Table -->
        <section class="table-section">

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Age</th>

                        <th>Grade</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="studentTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<div id="toast" class="toast"></div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
